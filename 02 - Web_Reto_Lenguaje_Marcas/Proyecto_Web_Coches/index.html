<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="Maserati, deportivo, lujo, coupe, GT">
    <meta name="robots" content="index, follow">
    <meta name="autor" content="FJGF">
    <meta name="description" content="Coches Maserati">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASERATI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Open Sans, sans-serif';
            font-size: 100%;
        }

        body {
            background-color: #070707;
        }

        main {
            max-width: 992px;
            margin: auto;
            background-color: #fff;
        }

        header {
            padding-top: 1em;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            padding: 0.3em;
            font-size: 2.3em;
            color: #428bca;
            font-family: 'Monserrat', sans-serif;
            letter-spacing: 5px;
        }

        section {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cajas-coches {
            background-color: #dedede;
            border-radius: 6px;
            border: 1px solid white;
            margin: 1em;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.3);
            text-align: center;
            font-family: 'Monserrat', sans-serif;
        }

        .cajas-coches:hover {
            filter: contrast(130%);
        }

        .cajas-coches p {
            margin-bottom: 1em;
            font-size: 1.3em;
        }

        .separador {
            flex-basis: 100%;
            /* Fuerza al párrafo a ocupar todo el ancho */
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        button {
            -webkit-border-radius: 6;
            border-radius: 6px;
            -moz-border-radius: 6;
            color: #ffffff;
            background: #3498db;
            padding: 10px 20px 10px 20px;
            border: solid #1f828d 2px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        button:hover {
            background: transparent;
            text-decoration: none;
            color: #1f628d;
            cursor: pointer;
        }

        footer {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.3em;
            padding: 1em;
            background-color: #000000;
            color: white;
        }

        .c-1 {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            text-align: center;
            padding: 1em;
        }

        .version {
            font-size: 0.75em;
            font-weight: 900;
        }

        .c-2 {
            color: #ADADAD;
            text-align: left;
            padding: 20px;
        }

        .c-2 a {
            color: #428BCA;
            text-decoration: none;
        }

        .c-2 a:hover,
        a:active {
            color: #F7F7F7;
        }
    </style>

</head>

<body>
    <main>
        <header>
            <div>
                <figure>
                    <img src="img/Maserati-Logo3.png" alt="#" title="logotipo Maserati" width="300px">
                    <figcaption style="text-align: center;">No es un coche. Es un buga para papis chulos</figcaption>
                </figure>
            </div>

            <h1 style="text-align: center";>Modelos 2025/2026</h1>
        </header>

        <section>
            <div class="cajas-coches">
                <figure>
                    <img src="img/gfx6.jpg" alt="#" title="Coche1" width="240px">
                </figure>
                <p>MC PURA</p>
                <a href="https://www.maserati.com/es/es/modelos/mcpura" target="_blank"
                    title="Especificaciones del modelo; se abre en otra pestaña">
                    <button>¿Eres ALPHA?</button>
                </a>
            </div>
            <div class="cajas-coches">
                <figure>
                    <img src="img/gfx1.jpg" alt="#" title="Coche2" width="240px">
                </figure>
                <p>GRECALE</p>
                <a href="https://www.maserati.com/es/es/modelos/granturismo" target="_blank"
                    title="Especificaciones del modelo; se abre en otra pestaña">
                    <button>¿Eres Beta?</button>
                </a>
            </div>
            <p class="separador">¿O ERES MÁS DE ENERGÍA CACHORRO?</p>

            </br>
            <div class="cajas-coches">
                <img src="img/gfx1-22.jpg" alt="#" title="Coche3" width="325px">
            </div>
            <div class="cajas-coches">
                <img src="img/gfx1-23.jpg" alt="#" title="Coche4" width="325px">
            </div>
        </section>
        <footer>
            <div class="c-1">
                <div>
                    <img src="img/LOGO2.png" alt="#" width="200px"><!--logo-->
                    <p>Catálogos Modelos 2025/26</p>
                    <p class="version">v 1.0 (12/02/2026)</p>
                </div>
            </div>
            <div class="c-2">
                <ul>
                    <li><a href="https://www.km77.com" target="_blank">Fotos e información de tu vehículo</a></li>
                    <li><a href="https://www.maserati.com/es/es/shopping-tools/dealer-locator?gclsrc=aw.ds&gad_source=1&gad_campaignid=22496257906&gbraid=0AAAAACoV6dJf_Ihk0f6FcF9vgibPT_pYA&gclid=CjwKCAiAkbbMBhB2EiwANbxtbeix0xBqrdg1FIgVdN-HPQVzIGLK199YxlqloxTx1eDoireWmSwgKRoCcq4QAvD_BwE"
                            title="Búsqueda de concesionario" target="_blank">Busca un
                            concesionario Maserati</a></li>
                    <li><a href="https://masparts.net/brands/maserati?gad_source=1&gad_campaignid=21168647260&gbraid=0AAAAACqE5IurFiDxl6E9sGSUvde5-uSg4&gclid=CjwKCAiAkbbMBhB2EiwANbxtbW0V45c2EnQkD2yjk_ma6LZKCJ_LdWX7s16O2u9B9B3EJNauJhwIIBoCvhkQAvD_BwE"
                            target="_blank">Repuestos Maserati</a></li>
                    <li><a href="https://masparts.net/brands/maserati?gad_source=1&gad_campaignid=21168647260&gbraid=0AAAAACqE5IurFiDxl6E9sGSUvde5-uSg4&gclid=CjwKCAiAkbbMBhB2EiwANbxtbW0V45c2EnQkD2yjk_ma6LZKCJ_LdWX7s16O2u9B9B3EJNauJhwIIBoCvhkQAvD_BwE"
                            target="_blank">Compra piezas de tu Maserati</a></li>
                </ul>
            </div>
        </footer>
    </main>
</body>

</html>

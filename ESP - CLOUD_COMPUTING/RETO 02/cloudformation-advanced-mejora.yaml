AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Version mejorada de la solucion de referencia para IaC avanzada en AWS.
  Incorpora una regla de lifecycle en S3, un output adicional de URL regional
  y convención de nombres empresarial mejorada.

Parameters:
  ProjectName:
    Type: String
    Default: iaclab
    AllowedPattern: '^[a-z0-9-]{3,15}$'
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
  # NUEVO PARÁMETRO AGREGADO
  OrganizationUnit:
    Type: String
    Default: infra
    Description: Unidad organizacional (infra, app, data, etc.)
    AllowedPattern: '^[a-z]{2,10}$'
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
  PublicSubnetCidr:
    Type: String
    Default: 10.20.1.0/24
  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
  Owner:
    Type: String
    Default: alumno
  CostCenter:
    Type: String
    Default: training
  EnableBucketVersioning:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  BucketVersioningEnabled: !Equals [!Ref EnableBucketVersioning, 'true']

Resources:
  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-vpc-${AWS::Region}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-igw-${AWS::Region}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref MainVPC

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-public-rt-${AWS::Region}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-public-subnet-${AWS::Region}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  PublicSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'HTTP access for ${OrganizationUnit}-${ProjectName}-${Environment}'
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
          Description: HTTP inbound
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-web-sg-${AWS::Region}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  SecureDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      # NOMBRE DE BUCKET MEJORADO
      BucketName: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-data-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !If [BucketVersioningEnabled, Enabled, Suspended]
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-data-bucket'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

  NotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      # NOMBRE DE TOPIC MEJORADO
      TopicName: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-alerts'
      Tags:
        - Key: Name
          # NOMBRE MEJORADO
          Value: !Sub '${OrganizationUnit}-${ProjectName}-${Environment}-alerts'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: ManagedBy
          Value: CloudFormation
        - Key: SolutionVersion
          Value: v2

Outputs:
  VpcId:
    Description: Identificador de la VPC creada.
    Value: !Ref MainVPC
  PublicSubnetId:
    Description: Identificador de la subred publica.
    Value: !Ref PublicSubnet
  SecurityGroupId:
    Description: Identificador del security group.
    Value: !Ref WebSecurityGroup
  BucketName:
    Description: Nombre del bucket S3 securizado.
    Value: !Ref SecureDataBucket
  BucketArn:
    Description: ARN del bucket S3.
    Value: !GetAtt SecureDataBucket.Arn
  BucketRegionalDomainName:
    Description: Dominio regional del bucket S3.
    Value: !GetAtt SecureDataBucket.RegionalDomainName
  SnsTopicArn:
    Description: ARN del topic SNS.
    Value: !Ref NotificationsTopic
